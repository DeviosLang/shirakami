# Shirakami 配置示例
# 复制为 shirakami.yaml 并填写实际配置值
# 所有 llm/db/redis 字段均可通过环境变量覆盖（见下方说明）

# 工作空间目录 — 所有 repo 将被 clone/pull 到此目录下（平铺）
workspace: /tmp/shirakami-workspace

# LLM 配置
# 支持 OpenAI 兼容接口（OpenAI / Azure OpenAI / Qwen / 本地 vLLM 等）
# 环境变量覆盖：
#   SHIRAKAMI_LLM_API_KEY   — API Key
#   SHIRAKAMI_LLM_ENDPOINT  — API 基础地址
#   SHIRAKAMI_LLM_MODEL     — 模型名称
llm:
  endpoint: https://api.openai.com/v1    # API 基础地址，末尾不带斜杠
  api_key: ""                             # 必填（或通过环境变量 SHIRAKAMI_LLM_API_KEY 设置）
  model: gpt-4o                           # 模型名称
  max_tokens: 128000                      # 最大 token 数，影响上下文压缩策略触发时机

# PostgreSQL 连接字符串
# 环境变量覆盖：SHIRAKAMI_DB_DSN
db:
  dsn: postgres://shirakami:shirakami@localhost:5432/shirakami?sslmode=disable

# Redis 连接地址（host:port）
# 环境变量覆盖：SHIRAKAMI_REDIS_ADDR
redis:
  addr: localhost:6379

# 需要分析的代码仓库列表
# 所有仓库将被 clone/pull 到 workspace 目录下，以 name 作为子目录名
repos:
  - name: api-gateway                          # 仓库短名（作为工作空间子目录名）
    url: git@github.com:org/api-gateway.git    # 支持 SSH 和 HTTPS 格式
    branch: main                               # 分支名，每次分析前自动 pull
    role: entry                                # entry: 标记为业务对外入口仓库
                                               # 集成测试入口从此仓库的路由注册函数识别
  - name: payment-service
    url: git@github.com:org/payment-service.git
    branch: main
    # role 字段省略时默认为普通服务仓库

  - name: order-service
    url: git@github.com:org/order-service.git
    branch: main

# 本次变更列表（支持多仓库同时变更）
changes:
  - repo: payment-service                      # 仓库名（对应 repos[].name）
    diff: ./diffs/payment.patch                # unified diff 文件路径（相对于配置文件）
    desc: 修改支付超时重试逻辑                  # 变更描述（辅助 LLM 理解变更意图）

  - repo: order-service
    diff: ./diffs/order.patch
    desc: 更新订单状态接口
